AWSTemplateFormatVersion: '2010-09-09'
Description: WordPress on EC2 with VPC, subnets, IGW, and custom index page

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
  InstanceType:
    Type: String
    Default: t2.micro
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: kiro-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: kiro-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: kiro-public-subnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: kiro-private-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: kiro-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HTTP, HTTPS, SSH
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: kiro-web-sg

  WordPressInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      Tags:
        - Key: Name
          Value: kiro-wordpress
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd mariadb105-server php php-mysqlnd php-fpm wget
          systemctl enable httpd mariadb
          systemctl start httpd mariadb

          mysql -e "CREATE DATABASE wordpress;"
          mysql -e "CREATE USER 'wpuser'@'localhost' IDENTIFIED BY 'WPpass123!';"
          mysql -e "GRANT ALL PRIVILEGES ON wordpress.* TO 'wpuser'@'localhost';"
          mysql -e "FLUSH PRIVILEGES;"

          cd /tmp
          wget https://wordpress.org/latest.tar.gz
          tar -xzf latest.tar.gz
          cp -r wordpress/* /var/www/html/
          chown -R apache:apache /var/www/html/
          chmod -R 755 /var/www/html/

          cp /var/www/html/wp-config-sample.php /var/www/html/wp-config.php
          sed -i "s/database_name_here/wordpress/" /var/www/html/wp-config.php
          sed -i "s/username_here/wpuser/" /var/www/html/wp-config.php
          sed -i "s/password_here/WPpass123!/" /var/www/html/wp-config.php

          cat > /var/www/html/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Dr. Dominic Singaraj</title>
          <style>
          body { font-family: Georgia, serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.8; color: #333; }
          h1 { color: #1a1a2e; }
          h3 { color: #16213e; margin-top: 2em; }
          strong { color: #0f3460; }
          ul { padding-left: 20px; }
          li { margin-bottom: 8px; }
          </style>
          </head>
          <body>
          <h1>Dr. Dominic Singaraj</h1>
          <p><strong>Principal Cloud Development Coach | AI Strategist | AWS Advocate</strong></p>
          <p><strong>Dr. Dominic Singaraj</strong> is a visionary cloud and AI leader, educator, and strategist with over two decades of global experience spanning software development, cloud architecture, artificial intelligence, and digital transformation.</p>
          <p>Currently serving as the <strong>Principal Cloud Development Coach at Neuefische GmbH</strong>, Dominic is the driving force behind empowering the next generation of cloud professionals, particularly through his leadership in the <strong>AWS re/Start program</strong>. He is also the founder of the <strong>AWS One Stop Shop Community</strong>, a fast-growing platform focused on democratizing cloud education and accelerating career growth in tech.</p>
          <p>His work spans:</p>
          <ul>
          <li>Building modern, cloud-native infrastructures on AWS</li>
          <li>Bridging technical AI knowledge with strategic business value</li>
          <li>Mentoring aspiring developers, data engineers, and future tech leaders</li>
          <li>Collaborating with global clients across the US, Germany, UK, India, and beyond</li>
          </ul>
          <h3>Signature Topics</h3>
          <ul>
          <li>Generative AI &amp; Claude 3 in Cloud Workflows</li>
          <li>AWS CloudFormation, DevOps, and Infrastructure as Code</li>
          <li>AI Ethics, Compliance, and Governance</li>
          <li>Empowering Underrepresented Talent in Tech</li>
          <li>Digital Transformation Strategy</li>
          </ul>
          </body>
          </html>
          HTMLEOF

          systemctl restart httpd

Outputs:
  PublicIP:
    Description: Public IP of the WordPress instance
    Value: !GetAtt WordPressInstance.PublicIp
  WebsiteURL:
    Description: URL of the website
    Value: !Sub http://${WordPressInstance.PublicIp}
  WordPressAdmin:
    Description: WordPress admin setup URL
    Value: !Sub http://${WordPressInstance.PublicIp}/wp-admin/install.php
  VPCID:
    Value: !Ref VPC
  PublicSubnetID:
    Value: !Ref PublicSubnet
  PrivateSubnetID:
    Value: !Ref PrivateSubnet
